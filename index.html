<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Achex Tech Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .logo {
      width: 80px;
      border-radius: 10px;
    }

    .qr {
      width: 180px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      background: black;
      padding: 10px 15px;
      border-radius: 8px;
      opacity: 0;
      transition: 0.3s;
    }

    #toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="card">

    <img src="profile.png" class="logo" alt="logo">

    <h2>ACHEX TECH HUB</h2>
    <p>Digital Identity • Tech Solutions</p>
    <p>📍 Embu, Kenya</p>

    <img
      class="qr"
      src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://achexhub.github.io/achex-tech-hub/"
      alt="QR Code"
    />

    <button onclick="copyText('+254706056515')">Copy Phone</button>
    <button onclick="copyText('achexhub@gmail.com')">Copy Email</button>
    <button onclick="saveContact()">Save Contact</button>
    <button onclick="shareCard()">Share</button>

  </div>

  <div id="toast"></div>

  <script>
    const toast = document.getElementById("toast");

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 2000);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Copied ✔");
      } catch {
        showToast("Copy failed");
      }
    }

    async function shareCard() {
      const data = {
        title: "Achex Tech Hub",
        text: "Digital Identity • Tech Solutions",
        url: window.location.href
      };

      try {
        if (navigator.share) {
          await navigator.share(data);
        } else {
          await copyText(window.location.href);
        }
      } catch {
        await copyText(window.location.href);
      }
    }

    function saveContact() {
      const vcf =
`BEGIN:VCARD
VERSION:3.0
FN:Achex Tech Hub
TEL:+254706056515
TEL:+254704817217
EMAIL:achexhub@gmail.com
ORG:Achex Tech Hub
ADR:Embu, Kenya
END:VCARD`;

      const blob = new Blob([vcf], { type: "text/vcard" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "AchexTechHub.vcf";
      a.click();

      URL.revokeObjectURL(url);
      showToast("Contact saved 📇");
    }
  </script>

</body>
</html>
