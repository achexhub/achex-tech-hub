<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACHEX TECH HUB</title>

<meta name="theme-color" content="#050505">
<meta name="description" content="Achex Tech Hub | Built For Performance • Chosen For You">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:#050505;

color:#fff;

overflow-x:hidden;

position:relative;

}

/* ==========================
   LUXURY AURORA
========================== */

body::before{

content:"";

position:fixed;

inset:-40%;

background:

radial-gradient(circle at 15% 20%,
rgba(61,213,255,.12),
transparent 35%),

radial-gradient(circle at 85% 25%,
rgba(255,215,0,.08),
transparent 35%),

radial-gradient(circle at 50% 80%,
rgba(0,255,180,.06),
transparent 40%);

filter:blur(90px);

animation:auroraMove 18s linear infinite;

z-index:-3;

}

@keyframes auroraMove{

0%{
transform:rotate(0deg) scale(1);
}

50%{
transform:rotate(180deg) scale(1.15);
}

100%{
transform:rotate(360deg) scale(1);
}

}

/* ==========================
   GRID
========================== */

body::after{

content:"";

position:fixed;

inset:0;

background-image:

linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),

linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);

background-size:38px 38px;

opacity:.35;

pointer-events:none;

z-index:-2;

}

/* ==========================
   MAIN CARD
========================== */

.card{

width:100%;
max-width:430px;

padding:32px 24px;

border-radius:30px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.10);

box-shadow:
0 30px 70px rgba(0,0,0,.75);

overflow:hidden;

position:relative;

animation:fadeUp .8s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}
/* ==========================
   TOP SECTION
========================== */

.top{
text-align:center;
}

.logo-ring{
width:130px;
height:130px;
margin:auto;
padding:4px;
border-radius:50%;

background:
linear-gradient(135deg,
#3dd5ff,
#ffd700);

box-shadow:
0 0 20px rgba(61,213,255,.18),
0 0 20px rgba(255,215,0,.10);
}

.logo-inner{
width:100%;
height:100%;
border-radius:50%;
padding:4px;
background:#090909;
}

.profile{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
display:block;
}

h1{

margin-top:18px;

font-size:28px;

font-weight:700;

letter-spacing:1px;

background:
linear-gradient(
90deg,
#ffffff,
#ffd700);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.tagline{

margin-top:8px;

font-size:14px;

color:#bfbfbf;

}

.location{

margin-top:14px;

display:flex;

justify-content:center;

align-items:center;

gap:8px;

font-size:13px;

color:#cfcfcf;

}

.location i{

color:#ff5757;

}

.status{

margin-top:12px;

display:inline-flex;

align-items:center;

gap:8px;

padding:10px 18px;

border-radius:50px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

font-size:13px;

}

.dot{

width:8px;

height:8px;

background:#22ff66;

border-radius:50%;

box-shadow:0 0 10px #22ff66;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.6);
opacity:.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

.premium-divider{

width:100%;

height:2px;

margin:24px auto 0;

background:
linear-gradient(
90deg,
transparent,
rgba(61,213,255,.4),
rgba(255,215,0,.4),
transparent
);

border-radius:50px;

}
</style>

</head>

<body>
  <div class="card">

    <div class="top">

        <div class="logo-ring">

            <div class="logo-inner">
                <img src="profile.png" class="profile" alt="Achex Tech Hub">
            </div>

        </div>

        <h1>ACHEX TECH HUB</h1>

        <p class="tagline">
            Built For Performance • Chosen For You
        </p>

        <div class="location">
            <i class="fa-solid fa-location-dot"></i>
            Embu, Kenya
        </div>

        <div class="status">
            <span class="dot"></span>
            Open for Business
        </div>

        <div class="premium-divider"></div>

    </div>
