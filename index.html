<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHEX TECH HUB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
  --accent:#3dd5ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* 🌌 BACKGROUND IMAGE RESTORED */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
padding:20px;
color:white;
position:relative;
}

/* background image layer */
body::before{
content:"";
position:absolute;
inset:0;
background:url('background.png') center/cover no-repeat;
z-index:-2;
transform:scale(1.05);
}

/* dark overlay for readability */
body::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* cyan glow effect */
.glow{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle, rgba(61,213,255,0.20), transparent 60%);
top:-180px;
left:-180px;
filter:blur(60px);
animation:moveGlow 14s infinite alternate ease-in-out;
z-index:-1;
}

.glow2{
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle, rgba(255,215,0,0.08), transparent 60%);
bottom:-180px;
right:-180px;
filter:blur(60px);
animation:moveGlow2 18s infinite alternate ease-in-out;
z-index:-1;
}

@keyframes moveGlow{
0%{transform:translate(0,0);}
100%{transform:translate(180px,120px);}
}

@keyframes moveGlow2{
0%{transform:translate(0,0);}
100%{transform:translate(-180px,-120px);}
}

/* 🧊 GLASS CARD */
.card{
width:100%;
max-width:420px;
padding:28px;
border-radius:24px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(22px);
-webkit-backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
z-index:1;
}

/* PROFILE */
.top{
text-align:center;
}

.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--accent);
box-shadow:0 0 20px rgba(61,213,255,0.25);
margin-bottom:12px;
}

/* GOLD + WHITE NAME */
h1{
font-size:24px;
margin-bottom:5px;
background:linear-gradient(90deg,#ffd700,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
font-size:13px;
opacity:0.85;
margin-bottom:5px;
}

.location{
font-size:12px;
opacity:0.75;
margin-bottom:18px;
}

/* CONTACT */
.contact-section{
display:flex;
gap:12px;
align-items:center;
}

.qr-box{
width:125px;
padding:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
border-radius:14px;
}

.qr-box img{
width:100%;
border-radius:10px;
}

.contact-info{
flex:1;
display:flex;
flex-direction:column;
gap:12px;
}

.info{
background:rgba(255,255,255,0.04);
border-radius:12px;
padding:10px;
display:flex;
gap:10px;
cursor:pointer;
transition:0.2s;
}

.info:active{
transform:scale(0.97);
background:rgba(255,255,255,0.10);
}

.info i{
color:var(--accent);
font-size:19px;
min-width:20px;
margin-top:2px;
}

.label{
font-size:12px;
font-weight:600;
opacity:0.75;
margin-bottom:3px;
}

.value{
font-size:13px;
line-height:1.4;
}

/* SOCIALS */
.socials{
display:flex;
justify-content:center;
gap:20px;
margin-top:18px;
}

.socials a{
color:var(--accent);
font-size:20px;
transition:0.3s;
}

.socials a:hover{
color:white;
transform:scale(1.15);
}

/* SAVE BUTTON */
.save-btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:rgba(61,213,255,0.15);
border:1px solid rgba(61,213,255,0.35);
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.save-btn:active{
transform:scale(0.96);
}

/* FOOTER */
.footer{
text-align:center;
font-size:11px;
opacity:0.45;
margin-top:18px;
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:white;
padding:10px 18px;
border-radius:8px;
font-size:13px;
opacity:0;
transition:.3s;
pointer-events:none;
border:1px solid rgba(255,255,255,.12);
}

#toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="card">

<div class="top">
<img src="profile.png" class="profile">
<h1>ACHEX TECH HUB</h1>
<div class="tagline">Digital Identity • Tech Solutions</div>
<div class="location">Embu, Kenya</div>
</div>

<div class="contact-section">

<div class="qr-box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://achexhub.github.io/achex-tech-hub/">
</div>

<div class="contact-info">

<div class="info" onclick="copyText('+254706056515 / +254704817217')">
<i class="fa-solid fa-mobile-screen-button"></i>
<div>
<div class="label">Phone</div>
<div class="value">+254706056515<br>+254704817217</div>
</div>
</div>

<div class="info" onclick="copyText('achexhub@gmail.com')">
<i class="fa-solid fa-envelope-open-text"></i>
<div>
<div class="label">Email</div>
<div class="value">achexhub@gmail.com</div>
</div>
</div>

</div>
</div>

<div class="socials">
<a href="#"><i class="fab fa-facebook-f"></i></a>
<a href="https://wa.me/254704817217"><i class="fab fa-whatsapp"></i></a>
<a href="https://instagram.com/achex_tech_ke"><i class="fab fa-instagram"></i></a>
<a href="https://vm.tiktok.com/ZS9jQc9FystjS-6hX4l/"><i class="fab fa-tiktok"></i></a>
<a href="https://x.com/achextech"><i class="fab fa-x-twitter"></i></a>
</div>

<button class="save-btn" onclick="downloadVCF()">📇 Save Contact</button>

<div class="footer">© 2026 Achex Tech Hub</div>

</div>

<div id="toast">✓ Copied</div>

<script>
function copyText(text){
navigator.clipboard.writeText(text);
showToast("✓ Copied to clipboard");
}

function showToast(msg){
const toast=document.getElementById("toast");
toast.innerText=msg;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2000);
}

function downloadVCF(){
const vcf =
`BEGIN:VCARD
VERSION:3.0
FN:Achex Tech Hub
TEL:+254706056515
TEL:+254704817217
EMAIL:achexhub@gmail.com
ORG:Embu
ADR:Embu, Kenya
END:VCARD`;

const blob=new Blob([vcf],{type:"text/vcard"});
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="AchexTechHub.vcf";
link.click();

showToast("📇 Contact Saved");
}
</script>

</body>
</html>
