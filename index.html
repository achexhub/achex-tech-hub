<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHEX TECH HUB</title>

<meta name="theme-color" content="#0a0a0a">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GLOBAL */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
padding:18px;
color:white;
}

/* 🌈 AURORA BACKGROUND */
body::before{
content:"";
position:fixed;
inset:-50%;
background:
radial-gradient(circle at 20% 20%, rgba(61,213,255,0.25), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,0,255,0.15), transparent 45%),
radial-gradient(circle at 50% 80%, rgba(0,255,170,0.12), transparent 50%);
z-index:-1;
filter:blur(40px);
}

@keyframes aurora{
0%{transform:rotate(0deg) scale(1.1);}
50%{transform:rotate(180deg) scale(1.3);}
100%{transform:rotate(360deg) scale(1.1);}
}

/* CARD */
.card{
width:100%;
max-width:420px;
padding:28px 22px;
border-radius:26px;
position:relative;
overflow:hidden;

background:rgba(255,255,255,0.04);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.10);
box-shadow:0 25px 70px rgba(0,0,0,0.85);

/* fade up */
opacity:0;
transform:translateY(30px);
animation:fadeUp 0.9s ease forwards;
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

/* TOP */
.top{
text-align:center;
margin-bottom:18px;
}

/* PROFILE RING */
.profile-wrap{
width:110px;
height:110px;
margin:0 auto 10px;
border-radius:50%;
padding:3px;
background:conic-gradient(from 0deg,#3dd5ff,#ff00ff,#ffd700,#3dd5ff);
animation:none !important;
transform:none !important;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.profile-inner{
width:100%;
height:100%;
border-radius:50%;
background:#000;
padding:3px;
}

.profile{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

/* NAME */
h1{
font-size:22px;
margin-top:8px;
background:linear-gradient(90deg,#ffd700,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TAGLINE */
.tagline{font-size:13px;opacity:0.85;}

/* LOCATION */
.location{
font-size:12px;
opacity:0.8;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
margin-top:3px;
}

.location i{color:#ff4d4d;}

/* STATUS */
.status{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
margin-top:8px;
font-size:11px;
color:#7CFF7C;
}

.status .dot{
width:7px;
height:7px;
background:#00ff66;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1;}
50%{transform:scale(1.6);opacity:0.5;}
100%{transform:scale(1);opacity:1;}
}
.top-divider{
width:180px;
height:3px;
margin:16px auto 0;
border-radius:999px;
background:linear-gradient(
90deg,
transparent 0%,
#3dd5ff 30%,
#ffd700 50%,
#3dd5ff 70%,
transparent 100%
);
box-shadow:
0 0 8px rgba(61,213,255,.35),
0 0 8px rgba(255,215,0,.25);
}
  .top-line{
width:100%;
height:1px;
margin:14px 0 10px;
background:linear-gradient(
to right,
transparent,
rgba(61,213,255,.35),
rgba(255,215,0,.35),
rgba(61,213,255,.35),
transparent
);
}

/* CONTACT */
.contact-section{
display:flex;
gap:12px;
align-items:center;
margin:20px 0;
}

.qr-box{
width:145px;
display:flex;
flex-direction:column;
align-items:center;
}

.qr-frame{
position:relative;
padding:10px;
background:#fff;
border-radius:18px;
animation:qrGlow 2.5s ease-in-out infinite;
}

.qr-frame img{
width:125px;
height:125px;
display:block;
border-radius:10px;
background:#fff;
}

@keyframes qrGlow{
0%,100%{
box-shadow:0 0 10px rgba(61,213,255,.35);
}
50%{
box-shadow:
0 0 18px rgba(61,213,255,.8),
0 0 35px rgba(61,213,255,.45);
}
}

.corner{
position:absolute;
width:16px;
height:16px;
border:3px solid #3dd5ff;
}

.tl{
top:-4px;
left:-4px;
border-right:none;
border-bottom:none;
}

.tr{
top:-4px;
right:-4px;
border-left:none;
border-bottom:none;
}

.bl{
bottom:-4px;
left:-4px;
border-right:none;
border-top:none;
}

.br{
bottom:-4px;
right:-4px;
border-left:none;
border-top:none;
}

.scan-text{
margin-top:10px;
font-size:11px;
font-weight:700;
letter-spacing:2px;
display:flex;
align-items:center;
justify-content:center;
gap:6px;
color:#fff;
}

.scan-text i{
color:#3dd5ff;
}

/* CONTACT INFO */
.contact-info{
flex:1;
display:flex;
flex-direction:column;
gap:12px;
}

/* INFO BOX */
.info{
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:12px;
display:flex;
gap:10px;
border-left:3px solid #3dd5ff;
transition:0.2s;
text-decoration:none;
color:inherit;
}
/* EMAIL LEFT BORDER */
.email-info{
border-left:3px solid #ffd700 !important;
}

.info:hover{
transform:translateY(-2px);
}

.info i{
font-size:18px;
min-width:22px;
margin-top:2px;
}

.phone-icon{color:#3dd5ff;}
.email-icon{color:#ffd700;}

.label{font-size:12px;opacity:0.7;font-weight:600;}
.value{font-size:13px;line-height:1.4;}
  .phone-link{
display:block;
margin-top:6px;
text-decoration:none;
color:#fff;
font-size:13px;
font-weight:500;
transition:.25s;
}

.phone-link:hover{
color:#3dd5ff;
}

.phone-link:active{
opacity:.8;
}

/* FOLLOW */
.follow{
display:flex;
align-items:center;
gap:10px;
margin:18px 0 8px;
}

.follow .line{
flex:1;
height:1px;
background:linear-gradient(
to right,
transparent,
rgba(61,213,255,.35),
rgba(255,215,0,.35),
rgba(61,213,255,.35),
transparent
);
}

.follow .text{
font-size:11px;
letter-spacing:2px;
opacity:0.8;
}

/* SOCIALS */
.socials{
display:flex;
justify-content:center;
gap:14px;
margin:10px 0 14px;
}

.socials a{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
transition:0.25s;
text-decoration:none;
}

.socials a:hover{
transform:scale(1.15);
background:rgba(61,213,255,0.08);
}

/* ICON COLORS */
.fa-facebook-f{color:#1877F2;}
.fa-whatsapp{color:#25D366;}
.fa-instagram{
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.fa-tiktok{color:#fff;text-shadow:1px 0 red,-1px 0 cyan;}
.fa-x-twitter{color:#fff;}

/* BUTTON ROW */
.btn-row{
display:flex;
gap:10px;
margin-top:12px;
}

/* SAVE */
.save-btn{
flex:1;
padding:12px;
border-radius:12px;
background:rgba(61,213,255,0.15);
border:1px solid rgba(61,213,255,0.35);
color:white;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

.save-btn:hover{
box-shadow:0 0 18px rgba(61,213,255,0.35);
transform:translateY(-2px);
}

/* SHARE */
.share-btn{
flex:1;
padding:12px;
border-radius:12px;
background:rgba(255,215,0,0.12);
border:1px solid rgba(255,215,0,0.5);
color:#ffd700;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

.share-btn:hover{
box-shadow:0 0 18px rgba(255,215,0,0.35);
transform:translateY(-2px);
}

/* FOOTER */
.footer{
text-align:center;
font-size:11px;
opacity:0.45;
margin-top:16px;
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:white;
padding:10px 16px;
border-radius:8px;
font-size:13px;
opacity:0;
transition:.3s;
border:1px solid rgba(255,255,255,.12);
}

#toast.show{opacity:1;}

</style>
</head>

<body>

<div class="card">

<div class="top">

<div class="profile-wrap">
<div class="profile-inner">
<img src="profile.png" class="profile">
</div>
</div>

<h1>ACHEX TECH HUB</h1>
<div class="tagline">Built For Perfomance  • Chosen For You</div>

<div class="location">
<i class="fa-solid fa-location-dot"></i>
Embu, Kenya
</div>

  <div class="status">
<div class="dot"></div>
Open for Business
</div>
<div class="top-line"></div>

<div class="contact-section">

<div class="qr-box">
    <div class="qr-frame">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>

        <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://achexhub.github.io/achex-tech-hub/" alt="QR Code">
    </div>

    <div class="scan-text">
        <i class="fa-solid fa-qrcode"></i>
        SCAN TO VISIT
    </div>
</div>

<div class="contact-info">

<!-- PHONE (click to dial) -->
<div class="info">
    <i class="fa-solid fa-mobile-screen-button phone-icon"></i>

    <div style="width:100%;">
        <div class="label">Phone</div>

        <a href="tel:+254706056515" class="phone-link">
            +254 706 056 515
        </a>

        <a href="tel:+254704817217" class="phone-link">
            +254 704 817 217
        </a>
    </div>
</div>

<!-- EMAIL (opens mail app) -->
  <a class="info email-info" href="mailto:achexhub@gmail.com">
<i class="fa-solid fa-envelope-open-text email-icon"></i>
<div>
<div class="label">Email</div>
<div class="value">achexhub@gmail.com</div>
</div>
</a>

</div>
</div>

<div class="follow">
<div class="line"></div>
<div class="text">FOLLOW US</div>
<div class="line"></div>
</div>

<div class="socials">
<a href="#"><i class="fab fa-facebook-f"></i></a>

<a href="https://vm.tiktok.com/ZS9jQc9FystjS-6hX4l/"><i class="fab fa-tiktok"></i></a>
<a href="https://x.com/achextech"><i class="fab fa-x-twitter"></i></a>
</div>

<div class="btn-row">
<button class="save-btn" onclick="downloadVCF()">📇 Save Contact</button>
<button class="share-btn" onclick="shareCard()">🔗 Share Card</button>
</div>

<div class="footer">© 2026 Achex Tech Hub</div>

</div>

<div id="toast">✓ Copied</div>

<script>

function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

function downloadVCF(){
const vcf=`BEGIN:VCARD
VERSION:3.0
FN:Achex Tech Hub
TEL:+254706056515
TEL:+254704817217
EMAIL:achexhub@gmail.com
ORG:Achex Tech Hub
ADR:Embu, Kenya
END:VCARD`;

const blob=new Blob([vcf],{type:"text/vcard"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="AchexTechHub.vcf";
a.click();

showToast("📇 Saved");
}

async function shareCard(){
const data={
title:"Achex Tech Hub",
text:"Check out my digital card",
url:window.location.href
};

try{
if(navigator.share){
await navigator.share(data);
return;
}
await navigator.clipboard.writeText(window.location.href);
showToast("🔗 Link copied");
}catch(e){}
}

</script>

</body>
 </html>
