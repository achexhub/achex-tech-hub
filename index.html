<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHEX TECH HUB</title>

<meta name="theme-color" content="#0a0a0a">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
  --accent:#3dd5ff;
}

/* GLOBAL */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at 20% 20%, rgba(61,213,255,0.15), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(255,0,255,0.08), transparent 45%),
linear-gradient(135deg,#050505,#0b0f14,#000);

padding:18px;
color:white;
}

/* CARD */
.card{
width:100%;
max-width:420px;
padding:28px 22px;
border-radius:26px;
position:relative;
overflow:hidden;

background:rgba(255,255,255,0.03);
box-shadow:0 25px 70px rgba(0,0,0,0.85);
border:1px solid rgba(255,255,255,0.10);
backdrop-filter:blur(10px);
}

/* TOP */
.top{
text-align:center;
margin-bottom:22px;
}

.profile{
width:105px;
height:105px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--accent);
box-shadow:0 0 25px rgba(61,213,255,0.25);
margin-bottom:12px;
}

h1{
font-size:23px;
margin-bottom:5px;
background:linear-gradient(90deg,#ffd700,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{font-size:13px;opacity:0.85;}

/* 📍 LOCATION WITH ICON */
.location{
font-size:12px;
opacity:0.8;
margin-top:3px;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.location i{
color:#ff4d4d;
font-size:12px;
}

/* CONTACT */
.contact-section{
display:flex;
gap:12px;
align-items:center;
margin:20px 0;
}

.qr-box{
width:140px;
padding:10px;
border-radius:14px;
background:white;
position:relative;
}

.qr-box img{
width:100%;
border-radius:10px;
display:block;
}

/* SCAN TEXT */
.scan-text{
text-align:center;
font-size:10px;
letter-spacing:2px;
margin-top:6px;
color:#000;
font-weight:700;
}

/* CONTACT INFO */
.contact-info{
flex:1;
display:flex;
flex-direction:column;
gap:12px;
}

.info{
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:12px;
display:flex;
gap:10px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.08);
transition:0.2s;
}

.info:hover{
transform:translateY(-2px);
}

/* ICON COLORS FIX */
.info i{
font-size:19px;
min-width:22px;
margin-top:2px;
}

/* CYAN PHONE ICON */
.phone-icon{
color:var(--accent);
}

/* GOLD EMAIL ICON */
.email-icon{
color:#ffd700;
}

.label{font-size:12px;opacity:0.7;font-weight:600;}
.value{font-size:13px;line-height:1.4;}

/* FOLLOW */
.follow{
display:flex;
align-items:center;
gap:10px;
margin:18px 0 8px;
}

.follow .line{
flex:1;
height:1px;
background:linear-gradient(to right,transparent,rgba(255,255,255,0.4),transparent);
}

.follow .text{
font-size:11px;
letter-spacing:2px;
opacity:0.8;
}

/* SOCIAL ICON BOXES */
.socials{
display:flex;
justify-content:center;
gap:14px;
margin:10px 0 14px;
}

.socials a{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
transition:0.25s;
text-decoration:none;
}

.socials a:hover{
transform:scale(1.15);
background:rgba(61,213,255,0.08);
}

/* ICON COLORS */
.fa-facebook-f{color:#1877F2;}
.fa-whatsapp{color:#25D366;}

.fa-instagram{
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.fa-tiktok{
color:#fff;
text-shadow:1px 0 red,-1px 0 cyan;
}

.fa-x-twitter{color:#fff;}

/* SAVE BUTTON WITH GLOW */
.save-btn{
width:100%;
padding:12px;
border-radius:12px;
background:rgba(61,213,255,0.15);
border:1px solid rgba(61,213,255,0.35);
color:white;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

.save-btn:hover{
background:rgba(61,213,255,0.25);
box-shadow:0 0 18px rgba(61,213,255,0.35);
transform:translateY(-2px);
}

.save-btn:active{
transform:scale(0.96);
}

/* FOOTER */
.footer{
text-align:center;
font-size:11px;
opacity:0.45;
margin-top:16px;
}

</style>
</head>

<body>

<div class="card">

<div class="top">
<img src="profile.png" class="profile">
<h1>ACHEX TECH HUB</h1>
<div class="tagline">Digital Identity • Tech Solutions</div>

<!-- 📍 UPDATED LOCATION -->
<div class="location">
<i class="fa-solid fa-location-dot"></i>
Embu, Kenya
</div>

</div>

<div class="contact-section">

<div class="qr-box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://achexhub.github.io/achex-tech-hub/">
<div class="scan-text">SCAN TO VISIT</div>
</div>

<div class="contact-info">

<div class="info" onclick="copyText('+254706056515 / +254704817217')">
<i class="fa-solid fa-mobile-screen-button phone-icon"></i>
<div>
<div class="label">Phone</div>
<div class="value">+254706056515<br>+254704817217</div>
</div>
</div>

<div class="info" onclick="copyText('achexhub@gmail.com')">
<i class="fa-solid fa-envelope-open-text email-icon"></i>
<div>
<div class="label">Email</div>
<div class="value">achexhub@gmail.com</div>
</div>
</div>

</div>
</div>

<div class="follow">
<div class="line"></div>
<div class="text">FOLLOW US</div>
<div class="line"></div>
</div>

<div class="socials">
<a href="#"><i class="fab fa-facebook-f"></i></a>
<a href="https://wa.me/254704817217"><i class="fab fa-whatsapp"></i></a>
<a href="https://instagram.com/achex_tech_ke"><i class="fab fa-instagram"></i></a>
<a href="https://vm.tiktok.com/ZS9jQc9FystjS-6hX4l/"><i class="fab fa-tiktok"></i></a>
<a href="https://x.com/achextech"><i class="fab fa-x-twitter"></i></a>
</div>

<button class="save-btn" onclick="downloadVCF()">📇 Save Contact</button>

<div class="footer">© 2026 Achex Tech Hub</div>

</div>

<script>
function copyText(text){
navigator.clipboard.writeText(text);
}

function downloadVCF(){
const vcf =
`BEGIN:VCARD
VERSION:3.0
FN:Achex Tech Hub
TEL:+254706056515
TEL:+254704817217
EMAIL:achexhub@gmail.com
ORG:Email
ADR:Embu, Kenya
END:VCARD`;

const blob=new Blob([vcf],{type:"text/vcard"});
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="AchexTechHub.vcf";
link.click();
}
</script>

</body>
</html>
