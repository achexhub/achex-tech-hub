<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achex Tech Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

/* MAIN BACKGROUND (NOW BLACK) */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
}

/* CARD */
.card{
position:relative;
width:90%;
max-width:400px;
padding:30px;
text-align:center;
border-radius:18px;
border:1px solid rgba(0,170,255,0.25);
background:
url('background.png') center/cover no-repeat,
rgba(0,0,0,0.6);

background-blend-mode:overlay;

box-shadow:0 0 25px rgba(0,170,255,0.2);
}

/* PROFILE */
img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #00aaff;
object-fit:cover;
margin-bottom:15px;
box-shadow:0 0 20px #00aaff;
}

/* NAME */
h1{
font-size:24px;
color:#00aaff;
margin-bottom:5px;
}

/* TEXT */
p{
font-size:13px;
opacity:0.8;
margin-bottom:5px;
}

/* LOCATION */
.location{
font-size:12px;
opacity:0.6;
margin-bottom:20px;
}

/* BUTTONS */
a{
display:block;
margin:10px 0;
padding:12px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:600;
transition:0.25s;
}

.call{background:#00aaff;}
.whatsapp{background:#25D366;}
.email{background:#444;}

a:hover{
transform:translateY(-2px);
opacity:0.9;
}

/* SOCIALS */
.socials{
margin-top:15px;
display:flex;
justify-content:center;
gap:20px;
}

.socials a{
color:#00aaff;
font-size:20px;
transition:0.3s;
}

.socials a:hover{
color:white;
transform:scale(1.2);
}

/* FOOTER */
.footer{
margin-top:15px;
font-size:11px;
opacity:0.5;
}
</style>
</head>

<body>

<div class="card">

<!-- PROFILE -->
<img src="profile.png" alt="profile">

<h1>ACHEX TECH HUB</h1>

<p>Digital Identity • Tech Solutions</p>

<div class="location">📍 Embu, Kenya</div>

<!-- BUTTONS -->
<a class="call" href="tel:+254706056515">📞 Call</a>
<a class="whatsapp" href="https://wa.me/254706056515">💬 WhatsApp</a>
<a class="email" href="mailto:achexhub@gmail.com">✉️ Email</a>

<!-- SOCIALS -->
<div class="socials">
<a href="https://instagram.com/achex_tech_ke"><i class="fab fa-instagram"></i></a>
<a href="https://vm.tiktok.com/ZS9jQc9FystjS-6hX4l/"><i class="fab fa-tiktok"></i></a>
<a href="https://x.com/achextech"><i class="fab fa-x-twitter"></i></a>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 Achex Tech Hub • All Rights Reserved
</div>

</div>

</body>
</html>
