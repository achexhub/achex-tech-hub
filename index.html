<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achex Tech Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

/* BACKGROUND */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
padding:20px;
}

/* CARD */
.card{
width:100%;
max-width:420px;
padding:30px;
text-align:center;
border-radius:18px;
border:1px solid rgba(0,170,255,0.25);
background:
url('background.png') center/cover no-repeat,
rgba(0,0,0,0.6);

background-blend-mode:overlay;
box-shadow:0 0 25px rgba(0,170,255,0.2);
}

/* PROFILE */
img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #00aaff;
object-fit:cover;
margin-bottom:15px;
box-shadow:0 0 20px #00aaff;
}

h1{
font-size:24px;
color:#00aaff;
margin-bottom:5px;
}

p{
font-size:13px;
opacity:0.8;
margin-bottom:5px;
}

.location{
font-size:12px;
opacity:0.6;
margin-bottom:15px;
}

/* SOCIAL ICONS ONLY */
.socials{
margin-top:10px;
display:flex;
justify-content:center;
gap:20px;
}

.socials a{
color:#00aaff;
font-size:20px;
transition:0.3s;
}

.socials a:hover{
transform:scale(1.2);
color:white;
}

/* QR SECTION */
.qr-section{
margin-top:25px;
padding-top:15px;
border-top:1px solid rgba(255,255,255,0.1);
}

.qr-title{
font-size:14px;
color:#00aaff;
margin-bottom:15px;
}

/* BIG CENTER QR */
.qr-box{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:12px;
}

.qr-box img{
width:200px;
height:200px;
border-radius:10px;
}

/* FOOTER */
.footer{
margin-top:15px;
font-size:11px;
opacity:0.5;
}
</style>
</head>

<body>

<div class="card">

<!-- PROFILE -->
<img src="profile.png" alt="profile">

<h1>ACHEX TECH HUB</h1>
<p>Digital Identity • Tech Solutions</p>

<div class="location">📍 Embu, Kenya</div>

<!-- SOCIALS ONLY -->
<div class="socials">
<a href="https://instagram.com/achex_tech_ke"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-facebook"></i></a>
<a href="https://x.com/achextech"><i class="fab fa-x-twitter"></i></a>
</div>

<!-- ONLY QR CODE -->
<div class="qr-section">

<div class="qr-title">SCAN TO VISIT</div>

<div class="qr-box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://achexhub.github.io/achex-tech-hub/">
</div>

</div>

<div class="footer">
© 2026 Achex Tech Hub
</div>

</div>

</body>
</html>
