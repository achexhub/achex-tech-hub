<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHEX TECH HUB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
padding:20px;
}

.card{
width:100%;
max-width:650px;
padding:30px;
border-radius:18px;
border:1px solid rgba(0,170,255,0.25);
background:
url('background.png') center/cover no-repeat,
rgba(0,0,0,0.75);
background-blend-mode:overlay;
box-shadow:0 0 25px rgba(0,170,255,0.2);
}

.top{
text-align:center;
margin-bottom:20px;
}

.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
border:3px solid #00aaff;
box-shadow:0 0 20px rgba(0,170,255,0.5);
}

h1{
font-size:24px;
margin-bottom:5px;
color:#00aaff;
}

p{
font-size:13px;
opacity:0.85;
margin-bottom:5px;
}

.location{
font-size:12px;
opacity:0.7;
margin-bottom:15px;
}

.middle{
display:flex;
gap:25px;
align-items:flex-start;
margin-top:15px;
}

.qr-box{
width:180px;
padding:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.18);
border-radius:14px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.qr-box img{
width:100%;
display:block;
border-radius:10px;
}

.right{
flex:1;
display:flex;
flex-direction:column;
gap:15px;
}

.info{
display:flex;
align-items:flex-start;
gap:12px;
padding:12px;
background:rgba(255,255,255,0.05);
border-radius:12px;
}

.info i{
color:white;
font-size:22px;
width:30px;
text-align:center;
margin-top:2px;
}

.text{
font-size:14px;
line-height:1.5;
}

.label{
font-weight:600;
margin-bottom:4px;
}

.socials{
display:flex;
justify-content:center;
gap:22px;
margin-top:25px;
}

.socials a{
color:#00aaff;
font-size:22px;
transition:0.3s;
}

.socials a:hover{
color:white;
transform:scale(1.15);
}

.footer{
margin-top:20px;
font-size:11px;
opacity:0.5;
text-align:center;
}

@media(max-width:700px){

.middle{
flex-direction:column;
align-items:center;
}

.right{
width:100%;
}

.qr-box{
width:220px;
}

}
</style>

</head>

<body>

<div class="card">

<div class="top">

<img src="profile.png" alt="Achex Tech Hub" class="profile">

<h1>ACHEX TECH HUB</h1>

<p>Digital Identity • Tech Solutions</p>

<div class="location">📍 Embu, Kenya</div>

</div>

<div class="middle">

<div class="qr-box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://achexhub.github.io/achex-tech-hub/" alt="QR Code">
</div>

<div class="right">

<div class="info">
<i class="fa-solid fa-mobile-screen-button"></i>
<div class="text">
<div class="label">Phone</div>
+254706056515 / +254704817217
</div>
</div>

<div class="info">
<i class="fa-solid fa-envelope-open-text"></i>
<div class="text">
<div class="label">Achex Tech Hub</div>
achexhub@gmail.com
</div>
</div>

</div>

</div>

<div class="socials">

<a href="#"><i class="fab fa-facebook-f"></i></a>

<a href="https://instagram.com/achex_tech_ke" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://vm.tiktok.com/ZS9jQc9FystjS-6hX4l/" target="_blank">
<i class="fab fa-tiktok"></i>
</a>

<a href="https://x.com/achextech" target="_blank">
<i class="fab fa-x-twitter"></i>
</a>

</div>

<div class="footer">
© 2026 Achex Tech Hub
</div>

</div>

</body>
</html>
