<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACHEX TECH HUB</title>

<meta name="theme-color" content="#050505">
<meta name="description" content="Achex Tech Hub | Built For Performance • Chosen For You">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:#050505;
overflow-x:hidden;
position:relative;
color:#fff;
}

/* Aurora */

body::before{
content:"";
position:fixed;
inset:-40%;
background:
radial-gradient(circle at 15% 20%,rgba(61,213,255,.14),transparent 35%),
radial-gradient(circle at 85% 25%,rgba(255,215,0,.08),transparent 35%),
radial-gradient(circle at 50% 80%,rgba(0,255,180,.06),transparent 40%);
filter:blur(90px);
animation:aurora 18s linear infinite;
z-index:-3;
}

@keyframes aurora{
0%{transform:rotate(0deg) scale(1);}
50%{transform:rotate(180deg) scale(1.15);}
100%{transform:rotate(360deg) scale(1);}
}

/* Grid */

body::after{
content:"";
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
background-size:38px 38px;
z-index:-2;
}

/* Card */

.card{
width:100%;
max-width:430px;
padding:30px 24px;
border-radius:30px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,.1);
box-shadow:0 30px 70px rgba(0,0,0,.75);
animation:fadeUp .8s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.top{
text-align:center;
}

.logo-ring{
width:130px;
height:130px;
margin:auto;
padding:4px;
border-radius:50%;
background:linear-gradient(135deg,#3dd5ff,#ffd700);
}

.logo-inner{
width:100%;
height:100%;
padding:4px;
border-radius:50%;
background:#0b0b0b;
}

.profile{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
display:block;
}

h1{
margin-top:18px;
font-size:28px;
font-weight:700;
letter-spacing:1px;
background:linear-gradient(90deg,#ffffff,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
margin-top:8px;
font-size:14px;
color:#bdbdbd;
}

.location{
margin-top:14px;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
font-size:13px;
color:#d4d4d4;
}

.location i{
color:#ff4d4d;
}

.status{
margin-top:14px;
display:inline-flex;
align-items:center;
gap:8px;
padding:10px 18px;
border-radius:50px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
font-size:13px;
}

.dot{
width:8px;
height:8px;
background:#22ff66;
border-radius:50%;
box-shadow:0 0 10px #22ff66;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.6);opacity:.5;}
100%{transform:scale(1);}
}

.premium-divider{
width:100%;
height:1px;
margin:22px auto 0;
background:linear-gradient(
90deg,
transparent,
rgba(61,213,255,.35),
rgba(255,215,0,.35),
transparent);
}
/* ==========================
CONTACT SECTION
========================== */

.contact-section{
display:flex;
align-items:center;
gap:18px;
margin-top:28px;
}

.qr-box{
width:145px;
display:flex;
flex-direction:column;
align-items:center;
}

.qr-frame{
position:relative;
padding:10px;
background:#fff;
border-radius:18px;
animation:qrGlow 3s ease-in-out infinite;
}

.qr-frame img{
width:125px;
height:125px;
display:block;
border-radius:10px;
}

@keyframes qrGlow{
0%,100%{
box-shadow:0 0 12px rgba(61,213,255,.35);
}
50%{
box-shadow:
0 0 22px rgba(61,213,255,.75),
0 0 40px rgba(61,213,255,.30);
}
}

.corner{
position:absolute;
width:16px;
height:16px;
border:3px solid #3dd5ff;
}

.tl{
top:-4px;
left:-4px;
border-right:none;
border-bottom:none;
}

.tr{
top:-4px;
right:-4px;
border-left:none;
border-bottom:none;
}

.bl{
bottom:-4px;
left:-4px;
border-right:none;
border-top:none;
}

.br{
bottom:-4px;
right:-4px;
border-left:none;
border-top:none;
}

.scan-text{
margin-top:10px;
font-size:10px;
letter-spacing:3px;
font-weight:700;
color:#d7d7d7;
}

.contact-info{
flex:1;
display:flex;
flex-direction:column;
gap:12px;
}

.info{
display:flex;
align-items:center;
gap:14px;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-left:3px solid #3dd5ff;
text-decoration:none;
color:#fff;
transition:.3s;
}

.info:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.08);
}

.email-card{
border-left:3px solid #ffd700;
}

.info i{
font-size:20px;
width:24px;
text-align:center;
}

.phone-icon{
color:#3dd5ff;
}

.email-icon{
color:#ffd700;
}

.label{
font-size:12px;
font-weight:600;
opacity:.7;
}

.value{
font-size:14px;
font-weight:500;
}
   /* ==========================
FOLLOW US
========================== */

.follow{
display:flex;
align-items:center;
gap:12px;
margin:30px 0 18px;
}

.follow .line{
flex:1;
height:1px;
background:linear-gradient(
90deg,
transparent,
rgba(61,213,255,.35),
rgba(255,215,0,.35),
transparent
);
}

.follow .text{
font-size:11px;
letter-spacing:3px;
color:#bdbdbd;
font-weight:600;
}

/* ==========================
SOCIALS
========================== */

.socials{
display:flex;
justify-content:center;
gap:14px;
margin:18px 0 24px;
}

.socials a{
width:46px;
height:46px;
display:flex;
align-items:center;
justify-content:center;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
text-decoration:none;
transition:.3s;
}

.socials a:hover{
transform:translateY(-4px) scale(1.05);
background:rgba(61,213,255,.08);
}

.fa-facebook-f{color:#1877F2;}
.fa-whatsapp{color:#25D366;}

.fa-instagram{
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#bc1888);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.fa-tiktok{color:#ffffff;}
.fa-x-twitter{color:#ffffff;}

/* ==========================
BUTTONS
========================== */

.btn-row{
display:flex;
gap:12px;
margin-top:10px;
}

.save-btn,
.share-btn{
flex:1;
padding:14px;
border-radius:14px;
font-size:14px;
font-weight:600;
cursor:pointer;
border:none;
transition:.3s;
}

.save-btn{
background:rgba(61,213,255,.15);
border:1px solid rgba(61,213,255,.35);
color:#fff;
}

.save-btn:hover{
transform:translateY(-2px);
box-shadow:0 0 18px rgba(61,213,255,.35);
}

.share-btn{
background:rgba(255,215,0,.12);
border:1px solid rgba(255,215,0,.40);
color:#ffd700;
}

.share-btn:hover{
transform:translateY(-2px);
box-shadow:0 0 18px rgba(255,215,0,.30);
}

/* ==========================
FOOTER
========================== */

.footer{
margin-top:22px;
text-align:center;
font-size:12px;
color:#777;
letter-spacing:.5px;
}

/* ==========================
TOAST
========================== */

#toast{
position:fixed;
left:50%;
bottom:24px;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:12px 18px;
border-radius:10px;
border:1px solid rgba(255,255,255,.1);
opacity:0;
transition:.3s;
z-index:999;
}

#toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="card">

    <div class="top">

        <div class="logo-ring">
            <div class="logo-inner">
                <img src="profile.png" class="profile" alt="Achex Tech Hub">
            </div>
        </div>

        <h1>ACHEX TECH HUB</h1>

        <div class="tagline">
            Built For Performance • Chosen For You
        </div>

        <div class="location">
            <i class="fa-solid fa-location-dot"></i>
            Embu, Kenya
        </div>

        <div class="status">
            <span class="dot"></span>
            Open for Business
        </div>

        <div class="premium-divider"></div>

    </div>

    <div class="contact-section">

        <div class="qr-box">

            <div class="qr-frame">

                <span class="corner tl"></span>
                <span class="corner tr"></span>
                <span class="corner bl"></span>
                <span class="corner br"></span>

                <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://achexhub.github.io/achex-tech-hub/" alt="QR Code">

            </div>

            <div class="scan-text">
                SCAN TO VISIT
            </div>

        </div>

        <div class="contact-info">

            <a class="info" href="tel:+254706056515">

                <i class="fa-solid fa-mobile-screen-button phone-icon"></i>

                <div>
                    <div class="label">Phone</div>
                    <div class="value">+254 706 056 515</div>
                </div>

            </a>

            <a class="info" href="tel:+254704817217">

                <i class="fa-solid fa-mobile-screen-button phone-icon"></i>

                <div>
                    <div class="label">Phone</div>
                    <div class="value">+254 704 817 217</div>
                </div>

            </a>

            <a class="info email-card" href="mailto:achexhub@gmail.com">

                <i class="fa-solid fa-envelope email-icon"></i>

                <div>
                    <div class="label">Email</div>
                    <div class="value">achexhub@gmail.com</div>
                </div>

            </a>

        </div>

    </div>

    <div class="follow">

        <div class="line"></div>

        <div class="text">FOLLOW US</div>

        <div class="line"></div>

    </div>
    <div class="socials">

    <a href="#" target="_blank" aria-label="Facebook">
        <i class="fab fa-facebook-f"></i>
    </a>

    <a href="https://wa.me/254704817217" target="_blank" aria-label="WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <a href="https://instagram.com/achex_tech_ke" target="_blank" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
    </a>

    <a href="https://vm.tiktok.com/ZS9jQc9FystjS-6hX4l/" target="_blank" aria-label="TikTok">
        <i class="fab fa-tiktok"></i>
    </a>

    <a href="https://x.com/achextech" target="_blank" aria-label="X">
        <i class="fab fa-x-twitter"></i>
    </a>

</div>

<div class="btn-row">

    <button class="save-btn" onclick="downloadVCF()">
        📇 Save Contact
    </button>

    <button class="share-btn" onclick="shareCard()">
        🔗 Share Card
    </button>

</div>

<div class="footer">
    © 2026 Achex Tech Hub
</div>

</div>

<div id="toast"></div>

<script>

function showToast(message){
    const toast=document.getElementById("toast");
    toast.textContent=message;
    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    },2000);
}

function downloadVCF(){

const vcf=`BEGIN:VCARD
VERSION:3.0
FN:Achex Tech Hub
ORG:Achex Tech Hub
TEL:+254706056515
TEL:+254704817217
EMAIL:achexhub@gmail.com
ADR:Embu, Kenya
END:VCARD`;

const blob=new Blob([vcf],{type:"text/vcard"});
const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="AchexTechHub.vcf";
link.click();

showToast("Contact Saved");

}

async function shareCard(){

const data={
title:"Achex Tech Hub",
text:"Built For Performance • Chosen For You",
url:window.location.href
};

try{

if(navigator.share){
await navigator.share(data);
}else{

await navigator.clipboard.writeText(window.location.href);

showToast("Link Copied");

}

}catch(err){}

}

</script>

</body>
</html>
