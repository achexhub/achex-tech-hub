<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achex Tech Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

/* BACKGROUND */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
padding:20px;
}

/* CARD */
.card{
width:100%;
max-width:450px;
padding:30px;
border-radius:18px;
border:1px solid rgba(0,170,255,0.25);
background:
url('background.png') center/cover no-repeat,
rgba(0,0,0,0.75);

background-blend-mode:overlay;
box-shadow:0 0 25px rgba(0,170,255,0.2);
}

/* TOP */
.top{
text-align:center;
margin-bottom:20px;
}

img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
box-shadow:0 0 15px rgba(0,170,255,0.6);
}

h1{
font-size:24px;
margin-bottom:5px;
color:#00aaff;
}

p{
font-size:13px;
opacity:0.8;
margin-bottom:5px;
}

.location{
font-size:12px;
opacity:0.6;
margin-bottom:15px;
}

/* MIDDLE */
.middle{
display:flex;
justify-content:flex-start;
align-items:center;
gap:20px;
margin-bottom:20px;
}

/* QR BOX (NO BLUE STYLE) */
.qr-box{
width:160px;
padding:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.18);
border-radius:14px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.qr-box img{
width:100%;
border-radius:10px;
box-shadow:none;
}

/* RIGHT SPACE */
.right-space{
flex:1;
height:160px;
}

/* SOCIALS (BLUE RETAINED HERE) */
.socials{
display:flex;
justify-content:center;
gap:18px;
margin-top:10px;
}

.socials a{
color:#00aaff;
font-size:20px;
transition:0.3s;
}

.socials a:hover{
color:white;
transform:scale(1.2);
}

/* FOOTER */
.footer{
margin-top:15px;
font-size:11px;
opacity:0.5;
text-align:center;
}
</style>
</head>

<body>

<div class="card">

<!-- TOP -->
<div class="top">

<img src="profile.png" alt="profile">

<h1>ACHEX TECH HUB</h1>
<p>Digital Identity • Tech Solutions</p>

<div class="location">📍 Embu, Kenya</div>

</div>

<!-- MIDDLE -->
<div class="middle">

<div class="qr-box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://achexhub.github.io/achex-tech-hub/">
</div>

<div class="right-space"></div>

</div>

<!-- SOCIALS -->
<div class="socials">

<a href="#"><i class="fab fa-facebook"></i></a>
<a href="https://instagram.com/achex_tech_ke"><i class="fab fa-instagram"></i></a>
<a href="https://vm.tiktok.com/ZS9jQc9FystjS-6hX4l/"><i class="fab fa-tiktok"></i></a>
<a href="https://x.com/achextech"><i class="fab fa-x-twitter"></i></a>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 Achex Tech Hub
</div>

</div>

</body>
</html>
