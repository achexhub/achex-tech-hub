<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achex Tech Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg, #050814, #000);
color:white;
}

/* Card */
.card{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
border:1px solid rgba(0,170,255,0.25);
border-radius:18px;
padding:30px;
text-align:center;
box-shadow:0 0 25px rgba(0,170,255,0.15);
}

/* Profile */
img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #00aaff;
object-fit:cover;
margin-bottom:15px;
box-shadow:0 0 20px #00aaff;
}

/* Name */
h1{
font-size:24px;
color:#00aaff;
margin-bottom:5px;
}

p{
font-size:13px;
opacity:0.75;
margin-bottom:5px;
}

.location{
font-size:12px;
opacity:0.6;
margin-bottom:20px;
}

/* Buttons */
a{
display:block;
margin:10px 0;
padding:12px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:600;
transition:0.25s;
}

.whatsapp{background:#25D366;}
.call{background:#00aaff;}
.email{background:#444;}

a:hover{
transform:translateY(-2px);
opacity:0.9;
}

/* Social icons */
.socials{
margin-top:15px;
display:flex;
justify-content:center;
gap:20px;
}

.socials a{
color:#00aaff;
font-size:20px;
transition:0.3s;
}

.socials a:hover{
color:white;
transform:scale(1.2);
}

/* Footer */
.footer{
margin-top:15px;
font-size:11px;
opacity:0.5;
}
</style>
</head>

<body>

<div class="card">

<img src="profile.png" alt="profile">

<h1>ACHEX TECH HUB</h1>
<p>Digital Identity • Tech Enthusiast</p>
<div class="location">📍 Nairobi, Kenya</div>

<a class="call" href="tel:+254706056515">📞 Call</a>
<a class="whatsapp" href="https://wa.me/254706056515">💬 WhatsApp</a>
<a class="email" href="mailto:achexhub@gmail.com">✉️ Email</a>

<div class="socials">
<a href="https://instagram.com/achex_tech_ke"><i class="fab fa-instagram"></i></a>
<a href="https://vm.tiktok.com/ZS9jQc9FystjS-6hX4l/"><i class="fab fa-tiktok"></i></a>
<a href="https://x.com/achextech"><i class="fab fa-x-twitter"></i></a>
</div>

<div class="footer">
© 2026 Achex Tech Hub
</div>

</div>

</body>
</html>
