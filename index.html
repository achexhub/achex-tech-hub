<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACHEX TECH HUB</title>

<meta name="theme-color" content="#050505">

<meta name="description" content="Achex Tech Hub | Built For Performance • Chosen For You">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#040404;

color:#fff;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:18px;

overflow-x:hidden;

position:relative;

}

/* ===========================
TECH BACKGROUND
=========================== */

body::before{

content:"";

position:fixed;

inset:0;

background:

radial-gradient(circle at 20% 20%,rgba(61,213,255,.10),transparent 35%),

radial-gradient(circle at 80% 15%,rgba(255,215,0,.08),transparent 30%),

radial-gradient(circle at 50% 85%,rgba(61,213,255,.08),transparent 35%);

filter:blur(80px);

animation:backgroundMove 18s linear infinite;

z-index:-3;

}

@keyframes backgroundMove{

0%{
transform:rotate(0deg) scale(1);
}

50%{
transform:rotate(180deg) scale(1.12);
}

100%{
transform:rotate(360deg) scale(1);
}

}

/* Circuit Grid */

body::after{

content:"";

position:fixed;

inset:0;

background-image:

linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),

linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);

background-size:40px 40px;

pointer-events:none;

z-index:-2;

}

/* ===========================
MAIN CARD
=========================== */

.card{

width:100%;

max-width:430px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.08);

border-radius:30px;

padding:30px 24px;

box-shadow:0 25px 60px rgba(0,0,0,.65);

position:relative;

overflow:hidden;

animation:fadeUp .8s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(35px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.top{

text-align:center;

}

.logo-ring{

width:135px;

height:135px;

margin:auto;

padding:4px;

border-radius:50%;

background:linear-gradient(135deg,#3dd5ff,#ffd700);

box-shadow:

0 0 20px rgba(61,213,255,.25),

0 0 20px rgba(255,215,0,.12);

}

.logo-inner{

width:100%;

height:100%;

padding:4px;

background:#080808;

border-radius:50%;

}

.profile{

width:100%;

height:100%;

border-radius:50%;

object-fit:cover;

display:block;

}
/* ===========================
HEADER
=========================== */

h1{

margin-top:20px;

font-size:29px;

font-weight:800;

letter-spacing:1px;

background:linear-gradient(90deg,#ffffff,#ffd700);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.tagline{

margin-top:8px;

font-size:14px;

font-weight:500;

color:#c8c8c8;

letter-spacing:.4px;

}

.location{

margin-top:16px;

display:flex;

justify-content:center;

align-items:center;

gap:8px;

font-size:13px;

color:#d8d8d8;

}

.location i{

color:#ff5b5b;

}

.status{

margin-top:15px;

display:inline-flex;

align-items:center;

gap:10px;

padding:10px 18px;

border-radius:999px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

font-size:13px;

font-weight:500;

}

.status .dot{

width:8px;

height:8px;

border-radius:50%;

background:#19ff66;

box-shadow:0 0 12px #19ff66;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.6);
opacity:.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* Premium Divider */

.premium-divider{

width:100%;

height:2px;

margin:24px 0 6px;

border-radius:999px;

background:linear-gradient(
90deg,
transparent 0%,
rgba(61,213,255,.55) 25%,
rgba(255,215,0,.55) 50%,
rgba(61,213,255,.55) 75%,
transparent 100%
);

box-shadow:
0 0 10px rgba(61,213,255,.18),
0 0 10px rgba(255,215,0,.12);

}
   /* ===========================
CONTACT SECTION
=========================== */

.contact-section{

display:flex;

gap:18px;

align-items:flex-start;

margin-top:26px;

}

.qr-box{

width:145px;

display:flex;

flex-direction:column;

align-items:center;

}

.qr-frame{

position:relative;

padding:10px;

background:#fff;

border-radius:18px;

box-shadow:
0 0 18px rgba(61,213,255,.18);

}

.qr-frame img{

width:125px;

height:125px;

display:block;

border-radius:10px;

background:#fff;

}

.corner{

position:absolute;

width:16px;

height:16px;

border:3px solid #3dd5ff;

}

.tl{

top:-4px;

left:-4px;

border-right:none;

border-bottom:none;

}

.tr{

top:-4px;

right:-4px;

border-left:none;

border-bottom:none;

}

.bl{

bottom:-4px;

left:-4px;

border-right:none;

border-top:none;

}

.br{

bottom:-4px;

right:-4px;

border-left:none;

border-top:none;

}

.scan-text{

margin-top:10px;

font-size:10px;

letter-spacing:3px;

font-weight:700;

color:#d5d5d5;

}

.contact-info{

flex:1;

display:flex;

flex-direction:column;

gap:14px;

}

/* PHONE BOX */

.phone-box{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-left:3px solid #3dd5ff;

border-radius:18px;

overflow:hidden;

}

.phone-row{

display:flex;

align-items:center;

gap:14px;

padding:14px;

text-decoration:none;

color:#fff;

transition:.3s;

}

.phone-row:hover{

background:rgba(255,255,255,.05);

}

.phone-divider{

height:1px;

background:rgba(255,255,255,.08);

margin:0 14px;

}

/* EMAIL BOX */

.email-box{

display:flex;

align-items:center;

gap:14px;

padding:14px;

background:rgba(255,215,0,.06);

border:1px solid rgba(255,215,0,.18);

border-left:3px solid #ffd700;

border-radius:18px;

text-decoration:none;

color:#fff;

transition:.3s;

}

.email-box:hover{

background:rgba(255,215,0,.10);

}

.phone-icon{

color:#3dd5ff;

font-size:20px;

width:24px;

text-align:center;

}

.email-icon{

color:#ffd700;

font-size:20px;

width:24px;

text-align:center;

}

.label{

font-size:12px;

font-weight:600;

opacity:.7;

}

.value{

font-size:14px;

font-weight:500;

}

/* ===========================
MOBILE RESPONSIVE
=========================== */

@media(max-width:520px){

.contact-section{

flex-direction:column;

align-items:center;

}

.qr-box{

width:100%;

}

.contact-info{

width:100%;

}

.qr-frame img{

width:150px;

height:150px;

}

}
   /* ===========================
FOLLOW US
=========================== */

.follow{

display:flex;

align-items:center;

gap:14px;

margin:30px 0 22px;

}

.follow .line{

flex:1;

height:2px;

border-radius:999px;

background:linear-gradient(
90deg,
transparent,
rgba(61,213,255,.45),
rgba(255,215,0,.45),
transparent
);

}

.follow .text{

font-size:11px;

font-weight:700;

letter-spacing:3px;

color:#cfcfcf;

white-space:nowrap;

}

/* ===========================
SOCIALS
=========================== */

.socials{

display:flex;

justify-content:center;

gap:16px;

margin-bottom:28px;

}

.socials a{

width:50px;

height:50px;

border-radius:16px;

display:flex;

justify-content:center;

align-items:center;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

text-decoration:none;

transition:.35s;

font-size:21px;

}

.socials a:hover{

transform:translateY(-5px);

background:rgba(255,255,255,.08);

box-shadow:0 0 20px rgba(61,213,255,.18);

}

.fa-facebook-f{color:#1877F2;}
.fa-whatsapp{color:#25D366;}

.fa-instagram{
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#bc1888);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.fa-tiktok{
color:#ffffff;
}

.fa-x-twitter{
color:#ffffff;
}

/* ===========================
BUTTONS
=========================== */

.btn-row{

display:flex;

gap:12px;

margin-bottom:24px;

}

.btn{

flex:1;

padding:15px;

border:none;

border-radius:16px;

font-size:14px;

font-weight:700;

cursor:pointer;

transition:.35s;

}

.save-btn{

background:linear-gradient(135deg,#3dd5ff,#2aa8d6);

color:#fff;

}

.save-btn:hover{

transform:translateY(-3px);

box-shadow:0 0 22px rgba(61,213,255,.35);

}

.share-btn{

background:linear-gradient(135deg,#ffd700,#d6b100);

color:#111;

}

.share-btn:hover{

transform:translateY(-3px);

box-shadow:0 0 22px rgba(255,215,0,.30);

}

/* ===========================
FOOTER
=========================== */

.footer{

text-align:center;

font-size:12px;

color:#8e8e8e;

line-height:1.8;

padding-top:10px;

border-top:1px solid rgba(255,255,255,.06);

}

/* ===========================
TOAST
=========================== */

#toast{

position:fixed;

left:50%;

bottom:25px;

transform:translateX(-50%);

background:#111;

padding:12px 22px;

border-radius:12px;

border:1px solid rgba(255,255,255,.1);

opacity:0;

transition:.3s;

z-index:999;

}

#toast.show{

opacity:1;

}

/* ===========================
END OF CSS
=========================== */

</style>

</head>

<script>

function showToast(message){

const toast=document.getElementById("toast");

toast.textContent=message;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

/* Save Contact */

function downloadVCF(){

const vcf=`BEGIN:VCARD
VERSION:3.0
FN:Achex Tech Hub
ORG:Achex Tech Hub
TEL;TYPE=CELL:+254706056515
TEL;TYPE=CELL:+254704817217
EMAIL:achexhub@gmail.com
ADR:;;Embu;;;Kenya
URL:https://achexhub.github.io/achex-tech-hub/
END:VCARD`;

const blob=new Blob([vcf],{type:"text/vcard"});

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="Achex-Tech-Hub.vcf";

link.click();

showToast("Contact saved successfully");

}

/* Share */

async function shareCard(){

const data={

title:"Achex Tech Hub",

text:"Built For Performance • Chosen For You",

url:"https://achexhub.github.io/achex-tech-hub/"

};

if(navigator.share){

try{

await navigator.share(data);

}catch(e){}

}else{

navigator.clipboard.writeText(data.url);

showToast("Website link copied");

}

}

</script>
