<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:#050505;

color:#fff;

overflow-x:hidden;

position:relative;

}

/* ==========================
   LUXURY AURORA
========================== */

body::before{

content:"";

position:fixed;

inset:-40%;

background:

radial-gradient(circle at 15% 20%,
rgba(61,213,255,.12),
transparent 35%),

radial-gradient(circle at 85% 25%,
rgba(255,215,0,.08),
transparent 35%),

radial-gradient(circle at 50% 80%,
rgba(0,255,180,.06),
transparent 40%);

filter:blur(90px);

animation:auroraMove 18s linear infinite;

z-index:-3;

}

@keyframes auroraMove{

0%{
transform:rotate(0deg) scale(1);
}

50%{
transform:rotate(180deg) scale(1.15);
}

100%{
transform:rotate(360deg) scale(1);
}

}

/* ==========================
   GRID
========================== */

body::after{

content:"";

position:fixed;

inset:0;

background-image:

linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),

linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);

background-size:38px 38px;

opacity:.35;

pointer-events:none;

z-index:-2;

}

/* ==========================
   MAIN CARD
========================== */

.card{

width:100%;
max-width:430px;

padding:32px 24px;

border-radius:30px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.10);

box-shadow:
0 30px 70px rgba(0,0,0,.75);

overflow:hidden;

position:relative;

animation:fadeUp .8s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}
/* ==========================
   TOP SECTION
========================== */

.top{
text-align:center;
}

.logo-ring{
width:130px;
height:130px;
margin:auto;
padding:4px;
border-radius:50%;

background:
linear-gradient(135deg,
#3dd5ff,
#ffd700);

box-shadow:
0 0 20px rgba(61,213,255,.18),
0 0 20px rgba(255,215,0,.10);
}

.logo-inner{
width:100%;
height:100%;
border-radius:50%;
padding:4px;
background:#090909;
}

.profile{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
display:block;
}

h1{

margin-top:18px;

font-size:28px;

font-weight:700;

letter-spacing:1px;

background:
linear-gradient(
90deg,
#ffffff,
#ffd700);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.tagline{

margin-top:8px;

font-size:14px;

color:#bfbfbf;

}

.location{

margin-top:14px;

display:flex;

justify-content:center;

align-items:center;

gap:8px;

font-size:13px;

color:#cfcfcf;

}

.location i{

color:#ff5757;

}

.status{

margin-top:12px;

display:inline-flex;

align-items:center;

gap:8px;

padding:10px 18px;

border-radius:50px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

font-size:13px;

}

.dot{

width:8px;

height:8px;

background:#22ff66;

border-radius:50%;

box-shadow:0 0 10px #22ff66;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.6);
opacity:.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

.premium-divider{

width:100%;

height:2px;

margin:24px auto 0;

background:
linear-gradient(
90deg,
transparent,
rgba(61,213,255,.4),
rgba(255,215,0,.4),
transparent
);

border-radius:50px;

}
   /*==========================
CONTACT SECTION
==========================*/

.contact-section{
display:flex;
align-items:center;
gap:18px;
margin-top:28px;
}

.qr-box{
width:150px;
display:flex;
flex-direction:column;
align-items:center;
}

.qr-frame{
position:relative;
padding:10px;
background:#fff;
border-radius:20px;
animation:qrGlow 2.8s ease-in-out infinite;
}

.qr-frame img{
width:130px;
height:130px;
display:block;
border-radius:10px;
background:#fff;
}

@keyframes qrGlow{
0%,100%{
box-shadow:0 0 10px rgba(61,213,255,.35);
}
50%{
box-shadow:
0 0 25px rgba(61,213,255,.8),
0 0 45px rgba(61,213,255,.35);
}
}

.corner{
position:absolute;
width:16px;
height:16px;
border:3px solid #3dd5ff;
}

.tl{
top:-4px;
left:-4px;
border-right:none;
border-bottom:none;
}

.tr{
top:-4px;
right:-4px;
border-left:none;
border-bottom:none;
}

.bl{
bottom:-4px;
left:-4px;
border-right:none;
border-top:none;
}

.br{
bottom:-4px;
right:-4px;
border-left:none;
border-top:none;
}

.scan-text{
margin-top:10px;
font-size:10px;
letter-spacing:3px;
font-weight:700;
color:#d9d9d9;
text-align:center;
}

.contact-info{
flex:1;
display:flex;
flex-direction:column;
gap:12px;
}

.info{
display:flex;
align-items:center;
gap:14px;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-left:3px solid #3dd5ff;
text-decoration:none;
color:#fff;
transition:.3s;
}

.info:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.08);
}

.email-card{
border-left:3px solid #ffd700;
}

.info i{
font-size:20px;
width:24px;
text-align:center;
}

.phone-icon{
color:#3dd5ff;
}

.email-icon{
color:#ffd700;
}

.label{
font-size:12px;
opacity:.65;
font-weight:600;
}

.value{
font-size:14px;
font-weight:500;
}
</style>

</head>
