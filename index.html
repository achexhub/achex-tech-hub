<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achex Tech Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

/* BACKGROUND */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
padding:20px;
}

/* CARD */
.card{
width:100%;
max-width:420px;
padding:30px;
text-align:center;
border-radius:18px;
border:1px solid rgba(0,170,255,0.25);
background:
url('background.png') center/cover no-repeat,
rgba(0,0,0,0.6);

background-blend-mode:overlay;
box-shadow:0 0 25px rgba(0,170,255,0.2);
}

/* PROFILE */
img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #00aaff;
object-fit:cover;
margin-bottom:15px;
box-shadow:0 0 20px #00aaff;
}

h1{
font-size:24px;
color:#00aaff;
}

p{
font-size:13px;
opacity:0.8;
margin-bottom:5px;
}

.location{
font-size:12px;
opacity:0.6;
margin-bottom:15px;
}

/* BUTTONS */
a{
display:block;
margin:10px 0;
padding:12px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:600;
}

.call{background:#00aaff;}
.whatsapp{background:#25D366;}
.email{background:#444;}

/* SOCIALS */
.socials{
margin-top:15px;
display:flex;
justify-content:center;
gap:20px;
}

.socials a{
color:#00aaff;
font-size:20px;
}

/* QR SECTION */
.qr-section{
margin-top:25px;
padding-top:15px;
border-top:1px solid rgba(255,255,255,0.1);
}

.qr-title{
font-size:14px;
color:#00aaff;
margin-bottom:15px;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.qr-box{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
font-size:10px;
}

.qr-box img{
width:100%;
border-radius:8px;
}

/* FOOTER */
.footer{
margin-top:15px;
font-size:11px;
opacity:0.5;
}
</style>
</head>

<body>

<div class="card">

<!-- PROFILE -->
<img src="profile.png" alt="profile">

<h1>ACHEX TECH HUB</h1>
<p>Digital Identity • Tech Solutions</p>
<div class="location">📍 Nairobi, Kenya</div>

<!-- BUTTONS -->
<a class="call" href="tel:+254704817217">📞 Call</a>
<a class="whatsapp" href="https://wa.me/254704817217">💬 WhatsApp</a>
<a class="email" href="mailto:achexhub@gmail.com">✉️ Email</a>

<!-- SOCIALS -->
<div class="socials">
<a href="https://instagram.com/achex_tech_ke"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-facebook"></i></a>
<a href="https://x.com/achextech"><i class="fab fa-x-twitter"></i></a>
</div>

<!-- QR SECTION -->
<div class="qr-section">

<div class="qr-title">📲 Scan & Connect</div>

<div class="qr-grid">

<!-- ONLY WEBSITE QR -->
<div class="qr-box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://achexhub.github.io/achex-tech-hub/">
<p>Website</p>
</div>

</div>
</div>

<div class="footer">
© 2026 Achex Tech Hub
</div>

</div>

</body>
</html>
