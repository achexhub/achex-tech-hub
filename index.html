<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHEX TECH HUB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
padding:20px;
color:white;
}

/* CARD */
.card{
width:100%;
max-width:420px;
border-radius:20px;
padding:25px;
background:
url('background.png') center/cover no-repeat,
rgba(0,0,0,0.75);
background-blend-mode:overlay;
border:1px solid rgba(0,170,255,0.25);
box-shadow:0 0 25px rgba(0,170,255,0.20);
}

/* PROFILE */
.top{
text-align:center;
}

.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #00aaff;
box-shadow:0 0 20px rgba(0,170,255,0.5);
margin-bottom:12px;
}

h1{
color:#00aaff;
font-size:24px;
margin-bottom:5px;
}

.tagline{
font-size:13px;
opacity:0.85;
margin-bottom:5px;
}

.location{
font-size:12px;
opacity:0.7;
margin-bottom:20px;
}

/* CONTACT SECTION */
.contact-section{
display:flex;
gap:12px;
align-items:flex-start;
margin-bottom:20px;
}

.qr-box{
width:130px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:12px;
padding:8px;
}

.qr-box img{
width:100%;
border-radius:8px;
}

.contact-info{
flex:1;
display:flex;
flex-direction:column;
gap:12px;
}

.info{
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:10px;
display:flex;
gap:10px;
align-items:flex-start;
cursor:pointer;
transition:0.2s ease;
}

/* 🔥 iPhone-style tap animation */
.info:active{
transform:scale(0.96);
background:rgba(255,255,255,0.12);
}

.info i{
color:white;
font-size:20px;
min-width:20px;
margin-top:2px;
}

.label{
font-size:12px;
font-weight:600;
opacity:0.8;
margin-bottom:3px;
}

.value{
font-size:13px;
line-height:1.4;
}

/* SOCIALS */
.socials{
display:flex;
justify-content:center;
gap:22px;
margin-top:10px;
}

.socials a{
color:#00aaff;
font-size:22px;
transition:0.3s;
}

.socials a:hover{
color:white;
transform:scale(1.15);
}

/* BUTTON */
.save-btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#00aaff;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.save-btn:active{
transform:scale(0.96);
}

/* FOOTER */
.footer{
text-align:center;
font-size:11px;
opacity:0.5;
margin-top:18px;
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:white;
padding:10px 18px;
border-radius:8px;
font-size:13px;
opacity:0;
transition:.3s;
pointer-events:none;
border:1px solid rgba(255,255,255,.15);
}

#toast.show{
opacity:1;
}
</style>
</head>

<body>

<div class="card">

<!-- TOP -->
<div class="top">

<img src="profile.png" class="profile">

<h1>ACHEX TECH HUB</h1>

<div class="tagline">Digital Identity • Tech Solutions</div>
<div class="location">📍 Embu, Kenya</div>

</div>

<!-- CONTACT -->
<div class="contact-section">

<div class="qr-box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://achexhub.github.io/achex-tech-hub/">
</div>

<div class="contact-info">

<div class="info" onclick="copyText('+254706056515 / +254704817217')">
<i class="fa-solid fa-mobile-screen-button"></i>
<div>
<div class="label">Phone</div>
<div class="value">
+254706056515<br>
+254704817217
</div>
</div>
</div>

<div class="info" onclick="copyText('achexhub@gmail.com')">
<i class="fa-solid fa-envelope-open-text"></i>
<div>
<div class="label">Email</div>
<div class="value">achexhub@gmail.com</div>
</div>
</div>

</div>
</div>

<!-- SAVE CONTACT BUTTON -->
<button class="save-btn" onclick="downloadVCF()">
📇 Save Contact
</button>

<!-- SOCIALS -->
<div class="socials">
<a href="#"><i class="fab fa-facebook-f"></i></a>
<a href="https://instagram.com/achex_tech_ke"><i class="fab fa-instagram"></i></a>
<a href="https://vm.tiktok.com/ZS9jQc9FystjS-6hX4l/"><i class="fab fa-tiktok"></i></a>
<a href="https://x.com/achextech"><i class="fab fa-x-twitter"></i></a>
</div>

<div class="footer">
© 2026 Achex Tech Hub
</div>

</div>

<!-- TOAST -->
<div id="toast">✓ Copied</div>

<script>
function copyText(text){
navigator.clipboard.writeText(text);
showToast("✓ Copied to clipboard");
}

/* TOAST */
function showToast(msg){
const toast = document.getElementById("toast");
toast.innerText = msg;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2000);
}

/* 📇 SAVE CONTACT (.VCF FILE) */
function downloadVCF(){
const vcf =
`BEGIN:VCARD
VERSION:3.0
FN:Achex Tech Hub
TEL:+254706056515
TEL:+254704817217
EMAIL:achexhub@gmail.com
ORG:Email
ADR:Embu, Kenya
END:VCARD`;

const blob = new Blob([vcf], {type:"text/vcard"});
const link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "AchexTechHub.vcf";
link.click();

showToast("📇 Contact Saved");
}
</script>

</body>
</html>
